<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flat Asphalt — Greedy Routing</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0d0d1a;
        color: #c8c8e8;
        font-family: "Courier New", monospace;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        gap: 20px;
      }

      canvas {
        border: 1px solid #2a2a4a;
        display: block;
        flex-shrink: 0;
      }

      #stats {
        width: 220px;
      }

      #runs {
        width: 260px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding-top: 2px;
      }

      .group h3 {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #4040a0;
        border-bottom: 1px solid #2a2a4a;
        padding-bottom: 5px;
        margin-bottom: 8px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 5px;
      }

      .lbl {
        color: #6060a0;
      }
      .val {
        color: #e0e0ff;
      }

      .big-val {
        font-size: 28px;
        color: #e0e0ff;
        text-align: right;
        line-height: 1;
        margin-top: 2px;
      }

      .legend-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #6060a0;
        margin-bottom: 5px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.25);
        flex-shrink: 0;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #4d96ff;
        cursor: pointer;
        margin-top: 4px;
      }

      button {
        width: 100%;
        margin-top: 4px;
        padding: 6px 0;
        background: #2a2a4a;
        color: #c8c8e8;
        border: 1px solid #4040a0;
        border-radius: 3px;
        font-family: "Courier New", monospace;
        font-size: 12px;
        letter-spacing: 1px;
        cursor: pointer;
      }

      button:hover {
        background: #3a3a6a;
        border-color: #6060c0;
      }

      .btn-sm {
        width: auto;
        flex: 1;
        margin-top: 0;
        padding: 3px 0;
        font-size: 10px;
        letter-spacing: 0.5px;
      }

      .saved-run {
        border-left: 2px solid #2a2a4a;
        padding-left: 8px;
        margin-bottom: 10px;
      }

      .saved-run-key {
        font-size: 10px;
        color: #8080c0;
        margin-bottom: 2px;
        word-break: break-all;
      }

      .saved-run-metrics {
        font-size: 12px;
        color: #e0e0ff;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="stats">
      <div class="group">
        <h3>Parameters</h3>
        <div class="row">
          <span class="lbl">Restaurants</span
          ><span class="val" id="p-restaurants"></span>
        </div>
        <input type="range" id="slider-restaurants" min="1" max="15" step="1" />
        <div class="row">
          <span class="lbl">Couriers</span
          ><span class="val" id="p-couriers"></span>
        </div>
        <input type="range" id="slider-couriers" min="1" max="30" step="1" />
        <div class="row">
          <span class="lbl">Avg travel time</span
          ><span class="val" id="p-travel"></span>
        </div>
        <input type="range" id="slider-travel" min="2" max="20" step="1" />
        <div class="row">
          <span class="lbl">Orders per day</span
          ><span class="val" id="p-order-rate"></span>
        </div>
        <input
          type="range"
          id="slider-order-interval"
          min="10"
          max="2000"
          step="10"
        />
        <div class="row">
          <span class="lbl">Prep mean</span
          ><span class="val" id="p-prep-mean"></span>
        </div>
        <input type="range" id="slider-prep-mean" min="2" max="40" step="1" />
        <div class="row">
          <span class="lbl">Prep std dev</span
          ><span class="val" id="p-prep-stddev"></span>
        </div>
        <input type="range" id="slider-prep-stddev" min="0" max="20" step="1" />
      </div>

      <div class="group">
        <h3>Simulation</h3>
        <div class="row">
          <span class="lbl">Time</span
          ><span class="val" id="v-time">00:00</span>
        </div>
        <div class="row">
          <span class="lbl">Speed</span><span class="val" id="v-speed">—</span>
        </div>
        <input
          type="range"
          id="speed-slider"
          min="60"
          max="7200"
          step="60"
          value="1200"
        />
        <div style="display: flex; gap: 6px; margin-top: 4px">
          <button id="btn-pause" style="flex: 1">PAUSE</button>
          <button id="btn-reset" style="flex: 1">RESET</button>
        </div>
      </div>

      <div class="group">
        <h3>Orders</h3>
        <div class="row">
          <span class="lbl">Completed</span
          ><span class="val" id="v-completed">0</span>
        </div>
        <div class="row">
          <span class="lbl">In flight</span
          ><span class="val" id="v-inflight">0</span>
        </div>
        <div class="row">
          <span class="lbl">Queued</span
          ><span class="val" id="v-queued">0</span>
        </div>
      </div>

      <div class="group">
        <h3>Efficiency (proj. /courier /8h)</h3>
        <div class="big-val" id="v-efficiency">—</div>
      </div>

      <div class="group">
        <h3>Quality</h3>
        <div class="row">
          <span class="lbl">Avg order delay</span
          ><span class="val" id="v-delay">—</span>
        </div>
        <div class="row">
          <span class="lbl">Courier utilization</span
          ><span class="val" id="v-util">—</span>
        </div>
      </div>
    </div>

    <div id="runs">
      <button id="btn-save-stats">SAVE STATS</button>

      <div class="group">
        <h3>Saved Runs</h3>
        <div id="saved-runs-list" style="font-size: 12px; color: #6060a0">
          No saved runs yet.
        </div>
      </div>
    </div>

    <script src="flat_asphalt_greedy.js"></script>
  </body>
</html>
